version: "3.9"

services:
  backend:
    container_name: linkpulse-backend

    build:
      context: ../../Backend
      dockerfile: ../docker/backend/Dockerfile

    ports:
      - "3000:3000"

    env_file:
      - ../../Backend/.env

    volumes:
      - ../../Backend:/app
      - /app/node_modules

  frontend:
    container_name: linkpulse-frontend

    build:
      context: ../../Frontend
      dockerfile: ../docker/frontend/Dockerfile

    ports:
      - "5173:5173"

    depends_on:
      - backend

    volumes:
      - ../../Frontend:/app
      - /app/node_modules